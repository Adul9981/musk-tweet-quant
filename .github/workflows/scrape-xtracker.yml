name: Scrape xtracker Data

on:
  # schedule 已暂停（2026-05-28）
  # 原因：GitHub Actions 账单问题导致每 3 分钟失败一次，持续收到报错通知
  # 备用方案：前端已通过 Vercel /api/xtracker 直接拉取，Gist fallback 暂不需要
  # 恢复方法：取消注释下方两行，删除此注释块
  # schedule:
  #   - cron: '*/3 * * * *'
  workflow_dispatch:         # 保留手动触发（需要时可手动更新 Gist）

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run xtracker scraper
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: python scripts/scrape_xtracker.py
