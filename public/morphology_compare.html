<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>走势形态对比分析 · 实时 vs 模板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
:root {
  --bg: #0b0d10; --card: #14171c; --card2: #1a1e26;
  --accent: #00d4aa; --accent2: #4cc9f0;
  --red: #ff6b6b; --warn: #ffd700; --muted: #8b9ab0;
  --border: #2a2f3a; --text: #e0e6f0;
  --orange: #ff9f43; --purple: #a29bfe;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'SF Pro Display', -apple-system, sans-serif; min-height: 100vh; }

header {
  background: linear-gradient(135deg, #020e0a 0%, #001812 50%, #020d18 100%);
  border-bottom: 2px solid var(--accent);
  padding: 20px 40px 16px;
}
header h1 { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
header p  { color: var(--muted); font-size: 0.81rem; margin-top: 4px; }

main { max-width: 1400px; margin: 0 auto; padding: 24px 24px 60px; }

/* ── Controls ── */
.controls {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 20px; margin-bottom: 24px;
}
.ctrl-label { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }
select {
  background: var(--card2); border: 1px solid var(--border); color: var(--text);
  padding: 7px 12px; border-radius: 8px; font-size: 0.84rem; min-width: 320px;
  cursor: pointer;
}
select:focus { outline: none; border-color: var(--accent); }
.refresh-btn {
  padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--card2); color: var(--muted); cursor: pointer; font-size: 0.82rem;
  transition: all .2s;
}
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
.status-pill {
  font-size: 0.75rem; padding: 4px 12px; border-radius: 20px;
  background: var(--card2); border: 1px solid var(--border); color: var(--muted);
}
.status-pill.ok { border-color: rgba(0,212,170,0.4); color: var(--accent); }
.status-pill.err { border-color: rgba(255,107,107,0.4); color: var(--red); }
.status-pill.loading { border-color: rgba(255,215,0,0.4); color: var(--warn); }

/* ── Range Summary ── */
.range-summary {
  display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px;
}
.range-chip {
  display: flex; align-items: center; gap: 8px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 14px; font-size: 0.82rem;
}
.range-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.range-name { font-weight: 600; }
.range-price { color: var(--muted); margin-left: 4px; }

/* ── Section ── */
.section {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 0; margin-bottom: 28px; overflow: hidden;
}
.sect-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  background: var(--card2);
}
.sect-label {
  font-size: 0.72rem; font-weight: 800; letter-spacing: 0.1em;
  color: var(--bg); background: var(--accent); padding: 3px 9px; border-radius: 5px;
}
.sect-label.b { background: var(--accent2); }
.sect-title { font-size: 0.95rem; font-weight: 600; flex: 1; }
.sect-time { font-size: 0.78rem; color: var(--muted); }

/* ── Actual chart ── */
.actual-wrap { padding: 16px 20px 0; }
.actual-legend {
  display: flex; gap: 20px; margin-bottom: 8px;
}
.al-item { display: flex; align-items: center; gap: 7px; font-size: 0.8rem; }
.al-line { width: 24px; height: 3px; border-radius: 2px; }
.actual-chart { height: 220px; width: 100%; }

/* ── Pattern Badge ── */
.match-bar {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  padding: 12px 20px; border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.15);
}
.match-label { font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
.pattern-badge {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 14px; border-radius: 8px; font-size: 0.85rem; font-weight: 700;
  border: 2px solid;
}
.match-conf { font-size: 0.78rem; color: var(--muted); }
.conf-bar {
  width: 80px; height: 6px; background: var(--card2); border-radius: 3px; overflow: hidden;
}
.conf-fill { height: 100%; border-radius: 3px; transition: width .5s; }
.match-reason { font-size: 0.78rem; color: var(--muted); flex: 1; }

/* ── Action Card ── */
.action-card {
  margin: 12px 20px; padding: 12px 16px;
  border-radius: 10px; border-left: 3px solid;
  font-size: 0.82rem; line-height: 1.6;
}
.action-card strong {
  font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em;
  display: block; margin-bottom: 5px;
}

/* ── Template Row ── */
.tmpl-section { padding: 16px 20px 20px; }
.tmpl-divider {
  font-size: 0.72rem; color: var(--muted); margin-bottom: 12px;
  display: flex; align-items: center; gap: 10px;
}
.tmpl-divider::before, .tmpl-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.tmpl-row {
  display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px;
}
@media (max-width: 1100px) { .tmpl-row { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 700px)  { .tmpl-row { grid-template-columns: repeat(2, 1fr); } }

.tmpl-card {
  border: 2px solid var(--border); border-radius: 10px; overflow: hidden;
  transition: border-color .2s, box-shadow .2s; cursor: pointer;
  background: var(--card2);
}
.tmpl-card:hover { border-color: var(--accent); }
.tmpl-card.matched { border-color: var(--accent) !important; box-shadow: 0 0 16px rgba(0,212,170,0.25) !important; }
.tmpl-head {
  padding: 7px 10px; display: flex; align-items: center; gap: 7px;
  border-bottom: 1px solid var(--border);
}
.tmpl-id {
  width: 22px; height: 22px; border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.78rem; font-weight: 800; flex-shrink: 0;
}
.tmpl-info { flex: 1; min-width: 0; }
.tmpl-name { font-size: 0.76rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tmpl-freq { font-size: 0.65rem; color: var(--muted); }
.tmpl-chart { height: 100px; }
.tmpl-action { padding: 6px 10px; font-size: 0.68rem; color: var(--muted); line-height: 1.5; border-top: 1px solid var(--border); }
.tmpl-card.matched .tmpl-action { color: var(--text); }

/* ── Loading / Error ── */
.loading-box {
  display: flex; align-items: center; justify-content: center;
  height: 220px; color: var(--muted); font-size: 0.85rem; flex-direction: column; gap: 10px;
}
.spinner {
  width: 28px; height: 28px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-box {
  display: flex; align-items: center; justify-content: center;
  height: 200px; color: var(--muted); font-size: 0.82rem; flex-direction: column; gap: 8px;
}
.error-icon { font-size: 1.8rem; }
</style>
</head>

<header>

        return j.data
          .filter(t => new Date(t.endDate) > now)
          .map(t => ({ slug: titleToSlug(t.title), title: t.title, endDate: t.endDate }))
          .filter(m => m.slug);
      }
    }
  } catch {}

  // 备用：gamma candidate slugs
  const months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
  const now = new Date();
  const slugs = [];
  const seen = new Set();
  for (let d = -3; d <= 7; d++) {
    const s = new Date(now.getTime() + d * 86400000);
    const e = new Date(s.getTime() + 7 * 86400000);
    const slug = `elon-musk-of-tweets-${months[s.getUTCMonth()]}-${s.getUTCDate()}-${months[e.getUTCMonth()]}-${e.getUTCDate()}`;
    if (!seen.has(slug)) { seen.add(slug); slugs.push(slug); }
  }
  return slugs.map(slug => ({ slug, title: slug, endDate: null }));
}

function titleToSlug(title) {
  const m = title.match(/tweets\s+(\w+)\s+(\d+)\s*[-–]\s*(\w+)\s+(\d+)/i);
  if (!m) return '';
  return `elon-musk-of-tweets-${m[1].toLowerCase()}-${m[2]}-${m[3].toLowerCase()}-${m[4]}`;
}

async function fetchEventRanges(slug) {
  const r = await fetch(`${GAMMA}/events?slug=${encodeURIComponent(slug)}`, {
    headers: { Accept: 'application/json' }, signal: AbortSignal.timeout(7000),
  });
  if (!r.ok) throw new Error(`gamma ${r.status}`);
  const data = await r.json();
  const events = Array.isArray(data) ? data : (data.data || []);
  const ev = events.find(e => e.slug === slug) || events[0];
  if (!ev) throw new Error('event not found');

  const markets = (ev.markets || []).map(m => {
    let minVal = null, maxVal = null;
    // Parse range from question title
    const q = m.question || m.title || '';
    const rangeMatch = q.match(/(\d+)\s+to\s+(\d+)/i) || q.match(/(\d+)\s*[-–]\s*(\d+)/);
    if (rangeMatch) { minVal = parseInt(rangeMatch[1]); maxVal = parseInt(rangeMatch[2]); }

    const prices = JSON.parse(m.outcomePrices || '["0","1"]');
    const tokens = JSON.parse(m.clobTokenIds || '["",""]');
    return {
      id: m.id,
      question: q,
      minVal, maxVal,
      yesPrice: parseFloat(prices[0] || 0),
      yesTokenId: tokens[0] || '',
      conditionId: m.conditionId || '',
      endDate: ev.endDate || ev.end_date_iso,
    };
  }).filter(m => m.minVal !== null);

  // Sort by range min
  markets.sort((a, b) => a.minVal - b.minVal);
  return { markets, endDate: ev.endDate || ev.end_date_iso, title: ev.title };
}

async function fetchHistory(tokenId) {
  if (!tokenId) throw new Error('no tokenId');
  // 48h at 1h fidelity
  const since = Math.floor((Date.now() - 49 * 3600000) / 1000);
  const url = `${CLOB}/prices-history?market=${tokenId}&interval=1d&fidelity=60&startTs=${since}`;
  const r = await fetch(url, { signal: AbortSignal.timeout(8000) });
  if (!r.ok) throw new Error(`clob ${r.status}`);
  const j = await r.json();
  const hist = j.history || [];
  return hist.map(p => ({ t: p.t * 1000, p: parseFloat(p.p) }));
}

// ═══════════════════════════════════════════════════════════════════
// 形态分类器
// ═══════════════════════════════════════════════════════════════════
function classifyPattern(greenHist, redHist) {
  const len = greenHist.length;
  if (len < 4) return { pattern: null, confidence: 0, reason: '数据不足（需至少4小时历史）', scores: {} };

  const gNow = greenHist[len-1];
  const rNow = redHist[len-1];
  const greenLeads = gNow > rNow;

  // Consecutive hours green has been leading (from now backwards)
  let greenLeadHours = 0;
  for (let i = len-1; i >= 0; i--) {
    if (greenHist[i] > redHist[i]) greenLeadHours++;
    else break;
  }

  // Consecutive hours red has been leading
  let redLeadHours = 0;
  for (let i = len-1; i >= 0; i--) {
    if (redHist[i] > greenHist[i]) redLeadHours++;
    else break;
  }

  // Crossovers in last 36h
  let crossovers = 0;
  const start36 = Math.max(0, len - 36);
  for (let i = start36; i < len - 1; i++) {
    const was = greenHist[i] > redHist[i];
    const now2 = greenHist[i+1] > redHist[i+1];
    if (was !== now2) crossovers++;
  }

  // Red gain in last 12h
  const lb12 = Math.min(12, len - 1);
  const redGain12h = rNow - redHist[len - 1 - lb12];

  // Green gain in last 6h
  const lb6 = Math.min(6, len - 1);
  const greenGain6h = gNow - greenHist[len - 1 - lb6];

  // Red max price in window
  const redMax = Math.max(...redHist);

  // Score each pattern [0-1]
  const scores = {};

  // A: Green dominates all the way through
  scores.A = (greenLeads ? 0.4 : 0)
    + (greenLeadHours >= 24 ? 0.4 : greenLeadHours / 24 * 0.3)
    + (redGain12h < 0.08 ? 0.2 : 0);

  // B: Initial tug-of-war, then green establishes ~12-36h ago
  scores.B = (greenLeads ? 0.3 : 0)
    + (crossovers >= 1 && crossovers <= 4 ? 0.3 : 0)
    + (greenLeadHours >= 12 && greenLeadHours < 40 ? 0.4 : 0);

  // C: Red led first, green overtook in last 6-24h
  scores.C = (greenLeads ? 0.3 : 0)
    + (crossovers >= 1 ? 0.25 : 0)
    + (greenLeadHours >= 4 && greenLeadHours < 24 ? 0.45 : 0);

  // D: Red dominates most of window, green surging in last 6-12h
  scores.D = (!greenLeads || greenLeadHours < 8 ? 0.3 : 0)
    + (greenGain6h > 0.10 ? 0.5 : greenGain6h > 0.05 ? 0.25 : 0)
    + (redLeadHours >= 12 || redMax > 0.4 ? 0.2 : 0);

  // E: Red dominates massively, green stuck at bottom with no chase
  scores.E = (!greenLeads ? 0.3 : 0)
    + (redMax > 0.6 ? 0.3 : 0)
    + (greenGain6h < 0.04 && gNow < 0.25 ? 0.4 : 0);

  // F: Green leading but red catching up fast at the end
  scores.F = (greenLeads ? 0.4 : 0)
    + (redGain12h > 0.12 ? 0.5 : redGain12h > 0.06 ? 0.25 : 0)
    + (greenLeadHours > 20 ? 0.1 : 0);

  // Find best match
  const best = Object.entries(scores).sort((a, b) => b[1] - a[1])[0];
  const second = Object.entries(scores).sort((a, b) => b[1] - a[1])[1];
  const pattern = best[0];
  const confidence = Math.min(0.95, best[1]);

  // Build reason string
  const reasons = {
    A: `绿色已连续领先 ${greenLeadHours}h，红色近12h仅涨 ${(redGain12h*100).toFixed(0)}%`,
    B: `出现 ${crossovers} 次拉锯后，绿色 ${greenLeadHours}h 前确立领先`,
    C: `绿色约 ${greenLeadHours}h 前完成反超，当前处于确认窗口`,
    D: `绿色近6h涨幅 ${(greenGain6h*100).toFixed(0)}%，末期追赶信号`,
    E: `绿色长期落后 ${(gNow*100).toFixed(1)}%，尚无有效追赶动量`,
    F: `绿色领先但红色近12h涨 ${(redGain12h*100).toFixed(0)}%，末期追赶压力大`,
  };

  return { pattern, confidence, reason: reasons[pattern] || '', scores, second: second[0] };
}

// ═══════════════════════════════════════════════════════════════════
// 渲染层
// ═══════════════════════════════════════════════════════════════════
function makeChart(domId) {
  const dom = document.getElementById(domId);
  if (!dom) return null;
  dom.innerHTML = '';
  if (_charts[domId]) { try { _charts[domId].dispose(); } catch {} }
  const c = echarts.init(dom, null, { renderer: 'canvas' });
  _charts[domId] = c;
  return c;
}

function renderActualChart(domId, greenHist, redHist, timestamps, greenLabel, redLabel) {
  const c = makeChart(domId);
  if (!c) return;

  const xLabels = timestamps.map(t => {
    const d = new Date(t);
    return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  });

  c.setOption({
    animation: false,
    backgroundColor: 'transparent',
    grid: { top: 8, bottom: 36, left: 44, right: 14 },
    xAxis: {
      type: 'category', data: xLabels, boundaryGap: false,
      axisLabel: {
        color: '#4a5568', fontSize: 10,
        formatter: (v, i) => (i % Math.ceil(xLabels.length / 6) === 0 ? v : ''),
      },
      axisLine: { lineStyle: { color: '#2a2f3a' } },
      splitLine: { show: false }, axisTick: { show: false },
    },
    yAxis: {
      type: 'value', min: 0, max: 1,
      splitLine: { lineStyle: { color: '#1e232d', type: 'dashed' } },
      axisLabel: {
        color: '#4a5568', fontSize: 10,
        formatter: v => (v === 0 || v === 0.5 || v === 1) ? v.toFixed(1) : '',
      },
    },
    series: [
      {
        name: greenLabel, type: 'line', smooth: true, symbol: 'none',
        lineStyle: { color: '#00d4aa', width: 2.5 },
        areaStyle: { color: 'rgba(0,212,170,0.06)' },
        data: greenHist,
      },
      {
        name: redLabel, type: 'line', smooth: true, symbol: 'none',
        lineStyle: { color: '#ff6b6b', width: 2.5 },
        areaStyle: { color: 'rgba(255,107,107,0.05)' },
        data: redHist,
      },
    ],
    tooltip: {
      trigger: 'axis', backgroundColor: '#14171c', borderColor: '#2a2f3a',
      textStyle: { color: '#e0e6f0', fontSize: 11 },
      formatter: p => p[0].axisValue + '<br>'
        + `<span style="color:#00d4aa">●</span> ${greenLabel} ${(p[0].data * 100).toFixed(1)}¢<br>`
        + `<span style="color:#ff6b6b">●</span> ${redLabel} ${(p[1].data * 100).toFixed(1)}¢`,
    },
  });
}

function renderMatchBar(domId, result) {
  const el = document.getElementById(domId);
  if (!el) return;
  if (!result || !result.pattern) {
    el.innerHTML = '<span class="match-label">形态识别：</span><span style="color:var(--muted);font-size:0.82rem">数据不足，无法自动识别</span>';
    return;
  }
  const t = TEMPLATES[result.pattern];
  const confPct = Math.round(result.confidence * 100);
  const t2 = TEMPLATES[result.second];
  el.innerHTML = `
    <span class="match-label">形态识别：</span>
    <div class="pattern-badge" style="border-color:${t.color};color:${t.color};background:${t.bg}">
      <span style="font-weight:900">${result.pattern}</span>
      <span>${t.name}</span>
    </div>
    <div class="conf-bar"><div class="conf-fill" style="width:${confPct}%;background:${t.color}"></div></div>
    <span class="match-conf">${confPct}%</span>
    <span class="match-reason">${result.reason}</span>
    ${t2 ? `<span style="font-size:0.72rem;color:var(--muted)">次可能：${result.second}·${t2.name}</span>` : ''}
  `;
}

function renderActionCard(domId, pattern) {
  const el = document.getElementById(domId);
  if (!el || !pattern) { if (el) el.style.display = 'none'; return; }
  const t = TEMPLATES[pattern];
  el.style.display = 'block';
  el.style.borderLeftColor = t.color;
  el.style.background = t.bg.replace('0.15', '0.07');
  el.innerHTML = `
    <strong style="color:${t.color}">操作参考 · ${t.signal}</strong>
    ${t.action}
  `;
}

function renderTemplateChart(containerId, tplKey, isMatched) {
  const domId = `tmpl-${containerId}-${tplKey}`;
  const t = TEMPLATES[tplKey];
  const c = echarts.init(document.getElementById(domId), null, { renderer: 'canvas' });
  _charts[domId] = c;

  const gSeries = {
    name: '目标区间', type: 'line', smooth: true, symbol: 'none',
    lineStyle: { color: '#00d4aa', width: 1.5 },
    areaStyle: { color: 'rgba(0,212,170,0.04)' },
    data: t.g,
  };
  if (t.zone) {
    gSeries.markArea = {
      silent: true,
      itemStyle: { color: t.zc || 'rgba(255,215,0,0.08)' },
      data: [[{ xAxis: t.zone[0] }, { xAxis: t.zone[1] }]],
    };
  }
  c.setOption({
    animation: false,
    backgroundColor: 'transparent',
    grid: { top: 2, bottom: 18, left: 28, right: 4 },
    xAxis: {
      type: 'category', data: TPL_X, boundaryGap: false,
      axisLabel: { color: '#3a4050', fontSize: 9, formatter: (v, i) => (i === 0 || i === 24 || i === 47) ? v : '' },
      axisLine: { lineStyle: { color: '#2a2f3a' } },
      splitLine: { show: false }, axisTick: { show: false },
    },
    yAxis: {
      type: 'value', min: 0, max: 1,
      splitLine: { lineStyle: { color: '#1a1e26', type: 'dashed' } },
      axisLabel: { color: '#3a4050', fontSize: 9, formatter: v => v === 0.5 ? '0.5' : '' },
    },
    series: [
      gSeries,
      {
        name: '竞争者', type: 'line', smooth: true, symbol: 'none',
        lineStyle: { color: '#ff6b6b', width: 1.5 },
        areaStyle: { color: 'rgba(255,107,107,0.03)' },
        data: t.r,
      },
    ],
  });
}

function renderTemplateRow(containerId, matchedPattern) {
  const row = document.getElementById(`tmpl-${containerId}`);
  if (!row) return;
  row.innerHTML = '';
  Object.keys(TEMPLATES).forEach(key => {
    const t = TEMPLATES[key];
    const isMatched = key === matchedPattern;
    const card = document.createElement('div');
    card.className = 'tmpl-card' + (isMatched ? ' matched' : '');
    card.id = `tmpl-card-${containerId}-${key}`;
    card.innerHTML = `
      <div class="tmpl-head">
        <div class="tmpl-id" style="background:${t.bg};color:${t.color}">${key}</div>
        <div class="tmpl-info">
          <div class="tmpl-name" style="${isMatched ? `color:${t.color}` : ''}">${t.name}</div>
          <div class="tmpl-freq">${t.freq}</div>
        </div>
      </div>
      <div class="tmpl-chart" id="tmpl-${containerId}-${key}"></div>
      <div class="tmpl-action">${isMatched ? t.action : t.signal}</div>
    `;
    row.appendChild(card);
    // Render template chart after DOM append
    setTimeout(() => renderTemplateChart(containerId, key, isMatched), 0);
  });
}

function renderLegend(domId, greenLabel, redLabel) {
  const el = document.getElementById(domId);
  if (!el) return;
  el.innerHTML = `
    <div class="al-item">
      <div class="al-line" style="background:#00d4aa"></div>
      <span style="color:#00d4aa;font-weight:600">${greenLabel}</span>
      <span style="color:var(--muted);font-size:0.72rem">（中心区间）</span>
    </div>
    <div class="al-item">
      <div class="al-line" style="background:#ff6b6b"></div>
      <span style="color:#ff6b6b;font-weight:600">${redLabel}</span>
    </div>
  `;
}

function showChartError(domId, msg) {
  const el = document.getElementById(domId);
  if (el) el.innerHTML = `<div class="error-box"><div class="error-icon">⚠</div><span>${msg}</span></div>`;
}

// ═══════════════════════════════════════════════════════════════════
// 主流程
// ═══════════════════════════════════════════════════════════════════
async function loadMarket(slug) {
  if (!slug) return;
  _currentSlug = slug;
  setStatus('loading', '获取市场数据...');

  // Reset charts
  ['A','B'].forEach(s => {
    document.getElementById(`chart-${s}`).innerHTML = '<div class="loading-box"><div class="spinner"></div>获取价格历史...</div>';
    document.getElementById(`match-${s}`).innerHTML = '<span class="match-label">形态识别：</span><span style="color:var(--muted);font-size:0.82rem">等待数据...</span>';
    document.getElementById(`action-${s}`).style.display = 'none';
    document.getElementById(`tmpl-${s}`).innerHTML = '';
  });
  document.getElementById('range-summary').innerHTML = '';

  let eventData;
  try {
    eventData = await fetchEventRanges(slug);
  } catch (e) {
    setStatus('err', '获取市场失败：' + e.message);
    showChartError('chart-A', '无法加载市场数据：' + e.message);
    showChartError('chart-B', '无法加载市场数据');
    return;
  }

  const { markets, endDate, title } = eventData;
  if (markets.length < 2) {
    setStatus('err', '区间数量不足（<2个）');
    return;
  }

  // Find hottest (highest YES price), with valid tokenId
  const sorted = [...markets].sort((a, b) => b.yesPrice - a.yesPrice);
  const hottest = sorted[0];
  const hottestIdx = markets.indexOf(hottest);

  const below = hottestIdx > 0 ? markets[hottestIdx - 1] : null;
  const above = hottestIdx < markets.length - 1 ? markets[hottestIdx + 1] : null;

  // Update section titles
  const fmtRange = m => m ? `${m.minVal}-${m.maxVal}` : '—';
  document.getElementById('title-A').textContent = `中心区间 vs 下方区间  ·  ${fmtRange(hottest)} 与 ${fmtRange(below)}`;
  document.getElementById('title-B').textContent = `中心区间 vs 上方区间  ·  ${fmtRange(hottest)} 与 ${fmtRange(above)}`;

  const timeLeft = endDate ? (() => {
    const diff = new Date(endDate) - new Date();
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    return h >= 0 ? `剩余 ${h}h ${m}m` : '已结束';
  })() : '';
  document.getElementById('time-A').textContent = timeLeft;
  document.getElementById('time-B').textContent = timeLeft;

  // Range summary chips
  const summaryEl = document.getElementById('range-summary');
  const addChip = (label, color, price) => {
    const chip = document.createElement('div');
    chip.className = 'range-chip';
    chip.innerHTML = `<div class="range-dot" style="background:${color}"></div><span class="range-name">${label}</span><span class="range-price">${(price*100).toFixed(1)}¢</span>`;
    summaryEl.appendChild(chip);
  };
  if (below) addChip(`${fmtRange(below)} 下方`, '#ff6b6b60', below.yesPrice);
  addChip(`${fmtRange(hottest)} 中心★`, '#00d4aa', hottest.yesPrice);
  if (above) addChip(`${fmtRange(above)} 上方`, '#ff6b6b60', above.yesPrice);

  setStatus('ok', `已加载 ${markets.length} 个区间 · ${new Date().toLocaleTimeString('zh-CN')}`);

  // Fetch history for each range and render comparisons
  await renderComparison('A', hottest, below, `${fmtRange(hottest)}`, `${fmtRange(below)}`);
  await renderComparison('B', hottest, above, `${fmtRange(hottest)}`, `${fmtRange(above)}`);
}

async function renderComparison(sectionId, centerMarket, compMarket, centerLabel, compLabel) {
  if (!compMarket) {
    showChartError(`chart-${sectionId}`, compMarket === null ? '该方向无相邻区间' : '无相邻区间');
    renderTemplateRow(sectionId, null);
    return;
  }

  let centerHist = [], compHist = [], timestamps = [];

  try {
    const [cd, rd] = await Promise.all([
      fetchHistory(centerMarket.yesTokenId),
      fetchHistory(compMarket.yesTokenId),
    ]);

    // Align by timestamp intersection
    const cMap = new Map(cd.map(p => [Math.round(p.t / 3600000), p.p]));
    const rMap = new Map(rd.map(p => [Math.round(p.t / 3600000), p.p]));
    const allHours = new Set([...cMap.keys(), ...rMap.keys()]);
    const sortedHours = [...allHours].sort();

    // Take last 48 points
    const window = sortedHours.slice(-48);
    window.forEach(h => {
      if (cMap.has(h) && rMap.has(h)) {
        timestamps.push(h * 3600000);
        centerHist.push(cMap.get(h));
        compHist.push(rMap.get(h));
      }
    });
  } catch (e) {
    console.warn('[fetchHistory]', e.message);
  }

  // If no history data, use current prices as single-point fallback
  if (centerHist.length < 2) {
    const now = Date.now();
    timestamps = [now - 3600000, now];
    centerHist = [centerMarket.yesPrice, centerMarket.yesPrice];
    compHist = [compMarket.yesPrice, compMarket.yesPrice];
    setStatus('ok', '历史价格不可用，仅显示当前价格');
  }

  renderLegend(`legend-${sectionId}`, centerLabel, compLabel);
  renderActualChart(`chart-${sectionId}`, centerHist, compHist, timestamps, centerLabel, compLabel);

  const result = classifyPattern(centerHist, compHist);
  renderMatchBar(`match-${sectionId}`, result);
  renderActionCard(`action-${sectionId}`, result.pattern);
  renderTemplateRow(sectionId, result.pattern);

  // Resize after render
  setTimeout(() => {
    const c = _charts[`chart-${sectionId}`];
    if (c) c.resize();
  }, 100);
}

function setStatus(type, msg) {
  const el = document.getElementById('status-pill');
  el.className = 'status-pill ' + type;
  el.textContent = msg;
}

async function init() {
  setStatus('loading', '加载市场列表...');
  let markets = [];
  try {
    markets = await fetchMarkets();
  } catch (e) {
    setStatus('err', '市场列表加载失败');
    return;
  }

  const sel = document.getElementById('market-sel');
  sel.innerHTML = '';
  if (markets.length === 0) {
    sel.innerHTML = '<option value="">未找到活跃市场</option>';
    setStatus('err', '未找到活跃市场');
    return;
  }

  markets.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.slug;
    opt.textContent = m.title || m.slug;
    sel.appendChild(opt);
  });

  sel.addEventListener('change', () => loadMarket(sel.value));
  await loadMarket(markets[0].slug);
}

function refresh() {
  const slug = document.getElementById('market-sel').value;
  if (slug) loadMarket(slug);
}

// Resize all charts on window resize
window.addEventListener('resize', () => {
  Object.values(_charts).forEach(c => { try { c.resize(); } catch {} });
});

init();
