<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>走势形态预测 · 区间对比分析</title>
<link rel="icon" type="image/png" href="/polymarket-musk.png" />
<link rel="apple-touch-icon" href="/polymarket-musk.png" />
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
:root {
  --bg: #0b0d10; --card: #14171c; --card2: #1a1e26;
  --accent: #00d4aa; --accent2: #4cc9f0;
  --red: #ff6b6b; --warn: #ffd700; --muted: #8b9ab0;
  --border: #2a2f3a; --text: #e0e6f0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'SF Pro Display', -apple-system, sans-serif; }

header {
  background: linear-gradient(135deg, #020e0a 0%, #001812 50%, #020d18 100%);
  border-bottom: 2px solid var(--accent); padding: 18px 40px 14px;
}
header h1 { font-size: 1.45rem; font-weight: 700; color: var(--accent); }
header p  { color: var(--muted); font-size: 0.79rem; margin-top: 4px; }

main { max-width: 1400px; margin: 0 auto; padding: 20px 24px 60px; }

/* ── Controls ── */
.controls {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 18px; margin-bottom: 16px;
}
.ctrl-label { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }
select {
  background: var(--card2); border: 1px solid var(--border); color: var(--text);
  padding: 6px 12px; border-radius: 8px; font-size: 0.83rem; min-width: 300px; cursor: pointer;
}
select:focus { outline: none; border-color: var(--accent); }
.refresh-btn {
  padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--card2); color: var(--muted); cursor: pointer; font-size: 0.81rem; transition: all .2s;
}
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
.status-pill {
  font-size: 0.73rem; padding: 3px 10px; border-radius: 20px;
  background: var(--card2); border: 1px solid var(--border); color: var(--muted);
}
.status-pill.ok      { border-color: rgba(0,212,170,0.4); color: var(--accent); }
.status-pill.err     { border-color: rgba(255,107,107,0.4); color: var(--red); }
.status-pill.loading { border-color: rgba(255,215,0,0.4);  color: var(--warn); }

/* ── Tweet Banner ── */
.tweet-banner {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 20px; margin-bottom: 16px;
}
.tb-header {
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em;
  color: var(--accent); text-transform: uppercase; margin-bottom: 12px;
  display: flex; align-items: center; gap: 10px;
}
.tb-header span { color: var(--muted); font-weight: 400; letter-spacing: 0; text-transform: none; font-size: 0.75rem; }
.tb-row { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-end; }
.tb-stat { display: flex; flex-direction: column; gap: 3px; }
.tb-val { font-size: 1.35rem; font-weight: 800; line-height: 1; }
.tb-label { font-size: 0.7rem; color: var(--muted); }
.tb-divider { width: 1px; height: 40px; background: var(--border); }
.tb-progress-wrap { flex: 1; min-width: 200px; }
.tb-progress-label { font-size: 0.72rem; color: var(--muted); margin-bottom: 5px; display: flex; justify-content: space-between; }
.tb-progress-bar { height: 6px; background: var(--card2); border-radius: 3px; overflow: hidden; }
.tb-progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .5s; }
.center-badge {
  padding: 5px 14px; border-radius: 8px; font-size: 0.82rem; font-weight: 700;
  border: 2px solid var(--accent); color: var(--accent); background: rgba(0,212,170,0.08);
  white-space: nowrap;
}
.tb-note { font-size: 0.75rem; color: var(--muted); align-self: center; }

/* ── Time relevance notice ── */
.relevance-note {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; border-radius: 8px; font-size: 0.8rem;
  margin-bottom: 16px; border-left: 3px solid;
}

/* ── Range Summary ── */
.range-summary { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.range-chip {
  display: flex; align-items: center; gap: 7px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 7px 12px; font-size: 0.8rem;
}
.range-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.range-name { font-weight: 600; }
.range-price { color: var(--muted); margin-left: 3px; }

/* ── Section ── */
.section {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; margin-bottom: 24px; overflow: hidden;
}
.sect-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 18px; border-bottom: 1px solid var(--border); background: var(--card2);
}
.sect-label {
  font-size: 0.7rem; font-weight: 800; letter-spacing: 0.1em;
  color: var(--bg); background: var(--accent); padding: 2px 8px; border-radius: 4px;
}
.sect-label.b { background: var(--accent2); }
.sect-title { font-size: 0.93rem; font-weight: 600; flex: 1; }
.sect-time { font-size: 0.76rem; color: var(--muted); }

/* ── Actual chart ── */
.actual-wrap { padding: 14px 18px 0; }
.actual-legend { display: flex; gap: 18px; margin-bottom: 7px; }
.al-item { display: flex; align-items: center; gap: 6px; font-size: 0.79rem; }
.al-line { width: 22px; height: 3px; border-radius: 2px; }
.actual-chart { height: 210px; }

/* ── Match bar ── */
.match-bar {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  padding: 10px 18px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.12);
}
.match-label { font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
.pattern-badge {
  display: flex; align-items: center; gap: 7px;
  padding: 4px 12px; border-radius: 7px; font-size: 0.83rem; font-weight: 700; border: 2px solid;
}
.conf-bar { width: 70px; height: 5px; background: var(--card2); border-radius: 3px; overflow: hidden; }
.conf-fill { height: 100%; border-radius: 3px; transition: width .5s; }
.match-reason { font-size: 0.76rem; color: var(--muted); flex: 1; }

/* ── Action Card ── */
.action-card {
  margin: 10px 18px; padding: 11px 15px;
  border-radius: 9px; border-left: 3px solid; font-size: 0.81rem; line-height: 1.6;
}
.action-card strong {
  font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em;
  display: block; margin-bottom: 4px;
}

/* ── Template Row ── */
.tmpl-section { padding: 14px 18px 18px; }
.tmpl-divider {
  font-size: 0.71rem; color: var(--muted); margin-bottom: 11px;
  display: flex; align-items: center; gap: 8px;
}
.tmpl-divider::before, .tmpl-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.tmpl-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 9px; }
@media (max-width: 1100px) { .tmpl-row { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 700px)  { .tmpl-row { grid-template-columns: repeat(2, 1fr); } }

.tmpl-card {
  border: 2px solid var(--border); border-radius: 10px; overflow: hidden;
  transition: border-color .2s, box-shadow .2s; cursor: pointer; background: var(--card2);
}
.tmpl-card:hover { border-color: var(--accent); }
.tmpl-card.matched { border-color: var(--accent) !important; box-shadow: 0 0 16px rgba(0,212,170,0.22) !important; }
.tmpl-head { padding: 7px 9px; display: flex; align-items: center; gap: 6px; border-bottom: 1px solid var(--border); }
.tmpl-id {
  width: 21px; height: 21px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center; font-size: 0.76rem; font-weight: 800; flex-shrink: 0;
}
.tmpl-info { flex: 1; min-width: 0; }
.tmpl-name { font-size: 0.73rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tmpl-freq { font-size: 0.63rem; color: var(--muted); }
.tmpl-chart { height: 95px; }
.tmpl-action { padding: 5px 9px; font-size: 0.66rem; color: var(--muted); line-height: 1.5; border-top: 1px solid var(--border); }
.tmpl-card.matched .tmpl-action { color: var(--text); }

/* ── Spinner / Error ── */
.loading-box {
  display: flex; align-items: center; justify-content: center;
  height: 210px; color: var(--muted); font-size: 0.83rem; flex-direction: column; gap: 10px;
}
.spinner {
  width: 26px; height: 26px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-box {
  display: flex; align-items: center; justify-content: center;
  height: 160px; color: var(--muted); font-size: 0.8rem; flex-direction: column; gap: 7px;
}
</style>
</head>
<body>

<header>
  <h1>走势形态预测分析</h1>
  <p>对比当前价格走势与六种历史形态模板 · 预判当前市场最终将走向哪种形态 · 仅显示7天期市场</p>
</header>

<main>

  <div class="controls">
    <span class="ctrl-label">当前期：</span>
    <select id="market-sel"><option value="">— 正在加载 —</option></select>
    <button class="refresh-btn" onclick="refresh()">↺ 刷新数据</button>
    <span id="status-pill" class="status-pill loading">加载中...</span>
  </div>

  <!-- Tweet count banner -->
  <div class="tweet-banner" id="tweet-banner" style="display:none">
    <div class="tb-header">📊 当前发推情况 <span id="tb-market-title"></span></div>
    <div class="tb-row">
      <div class="tb-stat">
        <div class="tb-val" id="tb-total" style="color:var(--accent)">—</div>
        <div class="tb-label">已计推文</div>
      </div>
      <div class="tb-stat">
        <div class="tb-val" id="tb-pace">—</div>
        <div class="tb-label">条/天</div>
      </div>
      <div class="tb-divider"></div>
      <div class="tb-progress-wrap">
        <div class="tb-progress-label"><span>已过 <span id="tb-elapsed">—</span> 天</span><span id="tb-total-days">— 天</span></div>
        <div class="tb-progress-bar"><div class="tb-progress-fill" id="tb-progress-fill" style="width:0%"></div></div>
      </div>
      <div class="tb-divider"></div>
      <div class="tb-stat">
        <div class="tb-val" id="tb-projected" style="color:var(--warn)">—</div>
        <div class="tb-label">预测总量（线性）</div>
      </div>
      <div>
        <div class="center-badge" id="tb-center">中心：—</div>
      </div>
      <div class="tb-note" id="tb-note"></div>
    </div>
  </div>

  <!-- Relevance notice -->
  <div class="relevance-note" id="relevance-note" style="display:none"></div>

  <!-- Range chips -->
  <div class="range-summary" id="range-summary"></div>

  <!-- Section A: Center vs Below -->
  <div class="section">
    <div class="sect-header">
      <span class="sect-label">对比 A</span>
      <span class="sect-title" id="title-A">中心区间 vs 下方区间</span>
      <span class="sect-time" id="time-A"></span>
    </div>
    <div class="actual-wrap">
      <div class="actual-legend" id="legend-A"></div>
      <div class="actual-chart" id="chart-A"><div class="loading-box"><div class="spinner"></div>获取价格历史...</div></div>
    </div>
    <div class="match-bar" id="match-A">
      <span class="match-label">形态预测：</span>
      <span style="color:var(--muted);font-size:0.81rem">等待数据...</span>
    </div>
    <div class="action-card" id="action-A" style="display:none"></div>
    <div class="tmpl-section">
      <div class="tmpl-divider">六种历史形态模板对比（高亮 = 预测走向，基于当前曲线特征）</div>
      <div class="tmpl-row" id="tmpl-A"></div>
    </div>
  </div>

  <!-- Section B: Center vs Above -->
  <div class="section">
    <div class="sect-header">
      <span class="sect-label b">对比 B</span>
      <span class="sect-title" id="title-B">中心区间 vs 上方区间</span>
      <span class="sect-time" id="time-B"></span>
    </div>
    <div class="actual-wrap">
      <div class="actual-legend" id="legend-B"></div>
      <div class="actual-chart" id="chart-B"><div class="loading-box"><div class="spinner"></div>获取价格历史...</div></div>
    </div>
    <div class="match-bar" id="match-B">
      <span class="match-label">形态预测：</span>
      <span style="color:var(--muted);font-size:0.81rem">等待数据...</span>
    </div>
    <div class="action-card" id="action-B" style="display:none"></div>
    <div class="tmpl-section">
      <div class="tmpl-divider">六种历史形态模板对比（高亮 = 预测走向，基于当前曲线特征）</div>
      <div class="tmpl-row" id="tmpl-B"></div>
    </div>
  </div>

</main>

const GAMMA   = 'https://gamma-api.polymarket.com';
const CLOB    = 'https://clob.polymarket.com';
const XTRACK  = 'https://xtracker.polymarket.com/api/users/elonmusk/trackings?activeOnly=true';

let _charts = {};
let _currentSlug = null;

async function fetchMarkets() {
  // 只取7天期市场（5-9天持续时间），按最快到期排序
  try {
    const r = await fetch(XTRACK, { signal: AbortSignal.timeout(7000) });
    if (r.ok) {
      const j = await r.json();
      if (j.success && Array.isArray(j.data) && j.data.length > 0) {
        const now = new Date();
        const markets = j.data
          .filter(t => {
            const end = new Date(t.endDate);
            const start = new Date(t.startDate);
            const diff = (end - start) / 86400000;
            return end > now && diff >= 5 && diff <= 9; // 7天期
          })
          .map(t => ({
            slug: titleToSlug(t.title),
            title: t.title,
            endDate: t.endDate,
            startDate: t.startDate,
            trackingId: t.id,
          }))
          .filter(m => m.slug)
          .sort((a, b) => new Date(a.endDate) - new Date(b.endDate)); // 最快到期在前
        if (markets.length > 0) return markets;
      }
    }
  } catch (e) { console.warn('[fetchMarkets xtracker]', e.message); }

  // Gamma 备用：构建候选 slug
  const months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
  const now = new Date();
  const slugs = [];
  const seen = new Set();
  for (let d = -1; d <= 7; d++) {
    const s = new Date(now.getTime() + d * 86400000);
    const e = new Date(s.getTime() + 7 * 86400000);
    const slug = `elon-musk-of-tweets-${months[s.getUTCMonth()]}-${s.getUTCDate()}-${months[e.getUTCMonth()]}-${e.getUTCDate()}`;
    if (!seen.has(slug)) { seen.add(slug); slugs.push({ slug, title: slug, endDate: e.toISOString(), startDate: s.toISOString() }); }
  }
  return slugs;
}

function titleToSlug(title) {
  const m = title.match(/tweets\s+(\w+)\s+(\d+)\s*[-–]\s*(\w+)\s+(\d+)/i);
  if (!m) return '';
  return `elon-musk-of-tweets-${m[1].toLowerCase()}-${m[2]}-${m[3].toLowerCase()}-${m[4]}`;
}

async function fetchEventRanges(slug) {
  const r = await fetch(`${GAMMA}/events?slug=${encodeURIComponent(slug)}`, {
    headers: { Accept: 'application/json' }, signal: AbortSignal.timeout(8000),
  });
  if (!r.ok) throw new Error(`gamma ${r.status}`);
  const data = await r.json();
  const events = Array.isArray(data) ? data : (data.data || []);
  const ev = events.find(e => e.slug === slug) || events[0];
  if (!ev) throw new Error('event not found');

  const markets = (ev.markets || []).map(m => {
    const q = m.question || m.title || '';
    const rm = q.match(/(\d+)\s+to\s+(\d+)/i) || q.match(/(\d+)\s*[-–]\s*(\d+)/);
    if (!rm) return null;
    const prices = JSON.parse(m.outcomePrices || '["0","1"]');
    const tokens = JSON.parse(m.clobTokenIds || '["",""]');
    return {
      id: m.id, question: q,
      minVal: parseInt(rm[1]), maxVal: parseInt(rm[2]),
      yesPrice: parseFloat(prices[0] || 0),
      yesTokenId: tokens[0] || '',
    };
  }).filter(Boolean);

  markets.sort((a, b) => a.minVal - b.minVal);
  return { markets, endDate: ev.endDate || ev.end_date_iso, title: ev.title };
}

async function fetchHistory(tokenId) {
  if (!tokenId) throw new Error('no tokenId');
  const since = Math.floor((Date.now() - 50 * 3600000) / 1000);
  const r = await fetch(`${CLOB}/prices-history?market=${tokenId}&interval=1d&fidelity=60&startTs=${since}`, {
    signal: AbortSignal.timeout(8000),
  });
  if (!r.ok) throw new Error(`clob ${r.status}`);
  const j = await r.json();
  return (j.history || []).map(p => ({ t: p.t * 1000, p: parseFloat(p.p) }));
}

// 获取推文数（尝试 xtracker API，备用 polystrike）
async function fetchTweetCount(slug, startDate, endDate) {
  // 方案1：xtracker posts API
  try {
    const url = `https://xtracker.polymarket.com/api/users/elonmusk/posts?startDate=${encodeURIComponent(startDate)}&endDate=${encodeURIComponent(endDate)}&limit=1000`;
    const r = await fetch(url, { signal: AbortSignal.timeout(6000) });
    if (r.ok) {
      const j = await r.json();
      const posts = j.data || [];
      if (posts.length > 0) return posts.length;
    }
  } catch {}

  // 方案2：polystrike
  try {
    const r = await fetch('https://polystrike.xyz/api/v1/meta/elon', { signal: AbortSignal.timeout(5000) });
    if (r.ok) {
      const j = await r.json();
      const endMs = new Date(endDate).getTime();
      const match = (j.data || []).find(p => Math.abs(p.end_ts - endMs) < 12 * 3600000);
      if (match) {
        const count = match.polymarket_xtracker_counter > 0 ? match.polymarket_xtracker_counter : match.real_counter;
        if (count > 0) return count;
      }
    }
  } catch {}

  return null;
}

// ═══════════════════════════════════════════════════════════════
// 形态预测分类器
// ═══════════════════════════════════════════════════════════════
function predictPattern(greenHist, redHist) {
  const len = greenHist.length;
  if (len < 4) return { pattern: null, confidence: 0, reason: '数据不足（需至少4小时价格历史）', scores: {} };

  const gNow = greenHist[len-1];
  const rNow = redHist[len-1];

  // 绿色连续领先小时数
  let greenLeadH = 0;
  for (let i = len-1; i >= 0; i--) {
    if (greenHist[i] > redHist[i]) greenLeadH++;
    else break;
  }
  // 红色连续领先小时数
  let redLeadH = 0;
  for (let i = len-1; i >= 0; i--) {
    if (redHist[i] > greenHist[i]) redLeadH++;
    else break;
  }

  // 最近36h内的交叉次数
  let crossovers = 0;
  const s36 = Math.max(0, len - 36);
  for (let i = s36; i < len - 1; i++) {
    if ((greenHist[i] > redHist[i]) !== (greenHist[i+1] > redHist[i+1])) crossovers++;
  }

  // 近12h红色涨幅
  const lb12 = Math.min(12, len - 1);
  const redGain12 = rNow - redHist[len - 1 - lb12];

  // 近6h绿色涨幅
  const lb6 = Math.min(6, len - 1);
  const greenGain6 = gNow - greenHist[len - 1 - lb6];

  // 绿色历史最低价
  const gMin = Math.min(...greenHist);
  // 红色历史最高价
  const rMax = Math.max(...redHist);

  const scores = {};

  // A：全程碾压 - 绿全程领先，红无有效追赶
  scores.A = (gNow > rNow ? 0.4 : 0)
    + (greenLeadH >= Math.min(24, len) ? 0.4 : greenLeadH / Math.max(len, 1) * 0.3)
    + (redGain12 < 0.07 ? 0.2 : 0);

  // B：快速确立 - 有拉锯，绿色12-40h前确立
  scores.B = (gNow > rNow ? 0.3 : 0)
    + (crossovers >= 1 && crossovers <= 4 ? 0.35 : 0)
    + (greenLeadH >= 10 && greenLeadH < 40 ? 0.35 : 0);

  // C：中期反超 - 红先领，绿近4-24h反超
  scores.C = (gNow > rNow ? 0.25 : 0.1)
    + (crossovers >= 1 ? 0.3 : 0)
    + (greenLeadH >= 2 && greenLeadH < 24 ? 0.4 : 0)
    + (gNow > rNow && redLeadH === 0 && greenLeadH < 24 ? 0.05 : 0);

  // D：末期追赶 - 红长期主导，绿近6h开始急拉
  scores.D = (gNow < rNow || greenLeadH < 8 ? 0.25 : 0)
    + (greenGain6 > 0.09 ? 0.5 : greenGain6 > 0.04 ? 0.25 : 0)
    + (redLeadH >= 10 || rMax > 0.45 ? 0.25 : 0);

  // E：临门一脚 - 红长期大幅领先，绿无动静趴底
  scores.E = (gNow < rNow ? 0.3 : 0)
    + (rMax > 0.55 ? 0.3 : 0)
    + (gNow < 0.20 && greenGain6 < 0.05 ? 0.4 : 0);

  // F：领先险守 - 绿领先但红末期急追
  scores.F = (gNow > rNow ? 0.35 : 0)
    + (redGain12 > 0.10 ? 0.5 : redGain12 > 0.05 ? 0.25 : 0)
    + (greenLeadH >= 18 ? 0.15 : 0);

  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const [bestKey, bestScore] = sorted[0];
  const [secondKey] = sorted[1];

  const confidence = Math.min(0.92, bestScore);

  const reasons = {
    A: `绿色已连续领先 ${greenLeadH}h，红色近12h仅涨 ${(redGain12*100).toFixed(0)}%，形态稳固`,
    B: `经历 ${crossovers} 次拉锯后绿色 ${greenLeadH}h 前确立领先，预计进入收敛阶段`,
    C: `绿色约 ${greenLeadH}h 前完成反超，处于确认窗口，关注后续是否稳固`,
    D: `绿色近6h涨幅 ${(greenGain6*100).toFixed(0)}%，末期追赶信号正在形成`,
    E: `绿色长期趴底 ${(gNow*100).toFixed(1)}¢，近6h无有效拉升，等待推文数突破触发`,
    F: `绿色领先但红色近12h大幅上涨 ${(redGain12*100).toFixed(0)}%，末期追赶压力加剧`,
  };

  return { pattern: bestKey, confidence, reason: reasons[bestKey] || '', scores, second: secondKey };
}

}

async function renderComparison(sectionId, centerMarket, compMarket, centerLabel, compLabel, hoursLeft) {
  if (!compMarket) {
    showChartError(`chart-${sectionId}`, '该方向无相邻区间');
    renderTemplateRow(sectionId, null);
    return;
  }

  let greenHist = [], redHist = [], timestamps = [];

  try {
    const [cd, rd] = await Promise.all([
      fetchHistory(centerMarket.yesTokenId),
      fetchHistory(compMarket.yesTokenId),
    ]);
    const cMap = new Map(cd.map(p => [Math.round(p.t / 3600000), p.p]));
    const rMap = new Map(rd.map(p => [Math.round(p.t / 3600000), p.p]));
    const allH = [...new Set([...cMap.keys(), ...rMap.keys()])].sort();
    allH.slice(-48).forEach(h => {
      if (cMap.has(h) && rMap.has(h)) {
        timestamps.push(h * 3600000);
        greenHist.push(cMap.get(h));
        redHist.push(rMap.get(h));
      }
    });
  } catch (e) {
    console.warn('[fetchHistory]', e.message);
  }

  // 不够数据时用当前价格占位
  if (greenHist.length < 2) {
    const now = Date.now();
    timestamps = [now - 3600000, now];
    greenHist = [centerMarket.yesPrice, centerMarket.yesPrice];
    redHist   = [compMarket.yesPrice,   compMarket.yesPrice];
  }

  renderLegend(`legend-${sectionId}`, centerLabel, compLabel);
  renderActualChart(`chart-${sectionId}`, greenHist, redHist, timestamps, centerLabel, compLabel);

  const result = predictPattern(greenHist, redHist);
  renderMatchBar(`match-${sectionId}`, result, hoursLeft);
  renderActionCard(`action-${sectionId}`, result.pattern, hoursLeft);
  renderTemplateRow(sectionId, result.pattern);

  setTimeout(() => { const c = _charts[`chart-${sectionId}`]; if (c) c.resize(); }, 120);
}

async function loadMarket(slug, startDate, endDate) {
  if (!slug) return;
  _currentSlug = slug;
  setStatus('loading', '加载市场数据...');

  // Reset
  ['A','B'].forEach(s => {
    document.getElementById(`chart-${s}`).innerHTML = '<div class="loading-box"><div class="spinner"></div>获取价格历史...</div>';
    document.getElementById(`match-${s}`).innerHTML = '<span class="match-label">形态预测：</span><span style="color:var(--muted);font-size:0.81rem">等待数据...</span>';
    document.getElementById(`action-${s}`).style.display = 'none';
    document.getElementById(`tmpl-${s}`).innerHTML = '';
  });
  document.getElementById('range-summary').innerHTML = '';
  document.getElementById('tweet-banner').style.display = 'none';
  document.getElementById('relevance-note').style.display = 'none';

  // Fetch market ranges
  let eventData;
  try {
    eventData = await fetchEventRanges(slug);
  } catch (e) {
    setStatus('err', '获取市场失败：' + e.message);
    ['A','B'].forEach(s => showChartError(`chart-${s}`, '无法加载市场：' + e.message));
    return;
  }

  const { markets, endDate: evEnd, title } = eventData;
  const useEnd = endDate || evEnd;
  const useStart = startDate;

  if (markets.length < 2) {
    setStatus('err', '区间不足'); return;
  }

  // 时间剩余
  const now = new Date();
  const diffMs = new Date(useEnd) - now;
  const hoursLeft = Math.max(0, diffMs / 3600000);
  const daysLeft = hoursLeft / 24;
  const timeStr = hoursLeft < 1 ? `${Math.floor(hoursLeft * 60)}分钟` : `${Math.floor(hoursLeft)}h ${Math.floor((hoursLeft % 1) * 60)}m`;

  // Section titles
  const [bestA, ...rest] = [...markets].sort((a, b) => b.yesPrice - a.yesPrice);
  const hottestIdx = markets.indexOf(bestA);
  const below = hottestIdx > 0 ? markets[hottestIdx - 1] : null;
  const above = hottestIdx < markets.length - 1 ? markets[hottestIdx + 1] : null;

  const fmtR = m => m ? `${m.minVal}-${m.maxVal}` : '—';
  document.getElementById('title-A').textContent = `对比 A：中心区间 ${fmtR(bestA)} vs 下方区间 ${fmtR(below)}`;
  document.getElementById('title-B').textContent = `对比 B：中心区间 ${fmtR(bestA)} vs 上方区间 ${fmtR(above)}`;
  document.getElementById('time-A').textContent = `剩余 ${timeStr}`;
  document.getElementById('time-B').textContent = `剩余 ${timeStr}`;

  // Relevance notice
  const rn = document.getElementById('relevance-note');
  rn.style.display = 'flex';
  if (hoursLeft <= 24) {
    rn.style.borderColor = '#00d4aa'; rn.style.background = 'rgba(0,212,170,0.07)';
    rn.innerHTML = '<span style="font-size:1.1rem">🎯</span><span>最后 24 小时，形态即将确立。<strong style="color:#00d4aa">预测可信度最高</strong>，结合推文数量判断决策。</span>';
  } else if (hoursLeft <= 48) {
    rn.style.borderColor = '#ffd700'; rn.style.background = 'rgba(255,215,0,0.06)';
    rn.innerHTML = '<span style="font-size:1.1rem">📍</span><span>距结算 ' + timeStr + '，进入<strong style="color:#ffd700">形态关键窗口（最后48h）</strong>，预测参考价值强。</span>';
  } else {
    rn.style.borderColor = '#8b9ab0'; rn.style.background = 'rgba(139,154,176,0.05)';
    rn.innerHTML = '<span style="font-size:1.1rem">⏱</span><span>距结算还有 ' + timeStr + '，形态仍在演变中。<strong style="color:var(--muted)">以下预测为当前阶段参考，最后48h精度显著提升。</strong></span>';
  }

  // Range chips
  const sumEl = document.getElementById('range-summary');
  const addChip = (label, color, price) => {
    const ch = document.createElement('div');
    ch.className = 'range-chip';
    ch.innerHTML = `<div class="range-dot" style="background:${color}"></div><span class="range-name">${label}</span><span class="range-price">${(price*100).toFixed(1)}¢</span>`;
    sumEl.appendChild(ch);
  };
  if (below) addChip(`${fmtR(below)} 下方`, 'rgba(255,107,107,0.6)', below.yesPrice);
  addChip(`${fmtR(bestA)} ★ 中心`, '#00d4aa', bestA.yesPrice);
  if (above) addChip(`${fmtR(above)} 上方`, 'rgba(255,107,107,0.6)', above.yesPrice);

  setStatus('ok', `${markets.length} 个区间 · ${new Date().toLocaleTimeString('zh-CN')}`);

  // Tweet count (async, don't block)
  if (useStart && useEnd) {
    fetchTweetCount(slug, useStart, useEnd).then(count => {
      if (count === null) return;
      const bannerEl = document.getElementById('tweet-banner');
      bannerEl.style.display = 'block';
      document.getElementById('tb-market-title').textContent = '· ' + (title || slug);

      const startMs = new Date(useStart).getTime();
      const endMs = new Date(useEnd).getTime();
      const totalDays = (endMs - startMs) / 86400000;
      const elapsedDays = Math.max(0.01, (now - new Date(useStart)) / 86400000);
      const pace = count / elapsedDays;
      const projected = Math.round(pace * totalDays);
      const pct = Math.min(100, Math.round(elapsedDays / totalDays * 100));

      document.getElementById('tb-total').textContent = count;
      document.getElementById('tb-pace').textContent = pace.toFixed(1);
      document.getElementById('tb-elapsed').textContent = elapsedDays.toFixed(1);
      document.getElementById('tb-total-days').textContent = `共 ${totalDays.toFixed(0)} 天`;
      document.getElementById('tb-progress-fill').style.width = pct + '%';
      document.getElementById('tb-projected').textContent = `~${projected} 条`;

      // 找预测落点区间
      const projMarket = markets.find(m => projected >= m.minVal && projected <= m.maxVal);
      document.getElementById('tb-center').textContent = projMarket
        ? `预测落点：${fmtR(projMarket)}`
        : `预测总量：~${projected}（区间外）`;

      // 备注
      const gapToHottest = bestA.minVal - count;
      const noteEl = document.getElementById('tb-note');
      if (projMarket && projMarket.minVal === bestA.minVal) {
        noteEl.textContent = '预测与中心落点一致 ✓';
        noteEl.style.color = 'var(--accent)';
      } else if (gapToHottest > 0) {
        noteEl.textContent = `距中心下沿还差 ${gapToHottest} 条`;
        noteEl.style.color = 'var(--warn)';
      } else {
        noteEl.textContent = `已超过中心上沿 ${Math.abs(gapToHottest)} 条`;
        noteEl.style.color = 'var(--red)';
      }
    }).catch(() => {});
  }

  // Render both comparisons in parallel
  await Promise.all([
    renderComparison('A', bestA, below, fmtR(bestA), fmtR(below), hoursLeft),
    renderComparison('B', bestA, above, fmtR(bestA), fmtR(above), hoursLeft),
  ]);
}

async function init() {
  setStatus('loading', '加载市场列表...');
  let markets = [];
  try { markets = await fetchMarkets(); } catch (e) {
    setStatus('err', '加载失败：' + e.message); return;
  }

  const sel = document.getElementById('market-sel');
  sel.innerHTML = '';

  if (markets.length === 0) {
    sel.innerHTML = '<option value="">未找到7天期活跃市场</option>';
    setStatus('err', '未找到7天期活跃市场'); return;
  }

  markets.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.slug;
    opt.dataset.start = m.startDate || '';
    opt.dataset.end = m.endDate || '';
    const daysLeft = m.endDate ? Math.round((new Date(m.endDate) - new Date()) / 86400000 * 10) / 10 : '?';
    opt.textContent = `${m.title || m.slug}  （${daysLeft}天后到期）`;
    sel.appendChild(opt);
  });

  sel.addEventListener('change', () => {
    const opt = sel.options[sel.selectedIndex];
    loadMarket(sel.value, opt.dataset.start, opt.dataset.end);
  });

  // 自动选最快到期的那一期
  const firstOpt = sel.options[0];
  await loadMarket(markets[0].slug, firstOpt.dataset.start, firstOpt.dataset.end);
}

function refresh() {
  const sel = document.getElementById('market-sel');
  const opt = sel.options[sel.selectedIndex];
  if (sel.value) loadMarket(sel.value, opt?.dataset.start, opt?.dataset.end);
}

window.addEventListener('resize', () => {
  Object.values(_charts).forEach(c => { try { c.resize(); } catch {} });
});

init();
</script>
